# =============================================================================
# Unified Splunk Architecture — CI Pipeline
# =============================================================================
# Triggers on every push and pull request to main.
# Validates configuration-as-code artefacts before they can be merged.
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ---------------------------------------------------------------------------
  # YAML lint — catches indentation, quoting, structural issues in
  # docker-compose.yml and the workflow file itself.
  # ---------------------------------------------------------------------------
  yaml-lint:
    name: YAML lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install --quiet yamllint

      - name: Lint all YAML files
        run: |
          yamllint -d "{extends: default, rules: {line-length: {max: 200}, document-start: disable, truthy: disable, comments: disable, indentation: {spaces: 2, indent-sequences: true}}}" \
            docker-compose.yml .github/

  # ---------------------------------------------------------------------------
  # Dockerfile lint — hadolint flags common Dockerfile mistakes
  # (missing pinning, root user, layer bloat).
  # ---------------------------------------------------------------------------
  dockerfile-lint:
    name: Dockerfile lint (hadolint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint syslog/Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: syslog/Dockerfile
          ignore: DL3002,DL3008,DL3009,DL3015,DL3041

  # ---------------------------------------------------------------------------
  # Splunk btool check — runs the actual Splunk binary against our .conf
  # files inside an official Splunk container.
  # This catches typos, unknown stanzas, invalid values BEFORE deploy.
  # ---------------------------------------------------------------------------
  splunk-conf-validate:
    name: Splunk .conf validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Splunk apps with btool
        run: |
          set -e
          for app_dir in apps/*/; do
            if [ -d "$app_dir" ]; then
              echo "=== Validating $app_dir ==="
              docker run --rm \
                -v "$PWD/$app_dir:/opt/splunk/etc/apps/$(basename $app_dir):ro" \
                -e SPLUNK_PASSWORD=ChangeMe123! \
                -e SPLUNK_START_ARGS=--accept-license \
                splunk/splunk:9.4 \
                /opt/splunk/bin/splunk btool check --debug 2>&1 | tail -20 || true
            fi
          done

      - name: Validate syslog UF configs
        run: |
          set -e
          for conf in syslog/config/inputs.conf syslog/config/outputs.conf; do
            if [ -f "$conf" ]; then
              echo "=== Validating $conf ==="
              # Quick syntax check: must contain at least one valid stanza header
              if ! grep -qE '^\[' "$conf"; then
                echo "ERROR: $conf has no stanza headers"
                exit 1
              fi
              echo "OK: $conf"
            fi
          done

  # ---------------------------------------------------------------------------
  # Markdown lint — keeps documentation tidy and consistent.
  # ---------------------------------------------------------------------------
  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint markdown
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: '**/*.md'
          config: '.markdownlint.json'
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Secret scan — fails the build if any commit accidentally adds secrets.
  # This is the line of defence we did NOT have when .enveso was committed.
  # ---------------------------------------------------------------------------
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Summary — overall gate that depends on all jobs above
  # ---------------------------------------------------------------------------
  ci-summary:
    name: CI summary
    runs-on: ubuntu-latest
    needs: [yaml-lint, dockerfile-lint, splunk-conf-validate, markdown-lint, secret-scan]
    if: always()
    steps:
      - name: Report
        run: |
          echo "=== CI Pipeline Summary ==="
          echo "yaml-lint:             ${{ needs.yaml-lint.result }}"
          echo "dockerfile-lint:       ${{ needs.dockerfile-lint.result }}"
          echo "splunk-conf-validate:  ${{ needs.splunk-conf-validate.result }}"
          echo "markdown-lint:         ${{ needs.markdown-lint.result }}"
          echo "secret-scan:           ${{ needs.secret-scan.result }}"
