# =============================================================================
# rsyslog config — Site A network device collector
# =============================================================================
# Devices send UDP/514 → rsyslog buffers via disk queue → writes per-host file
# Splunk UF tails files via monitor:// (fishbucket tracks position)
# =============================================================================

module(load="imudp")
module(load="imtcp")
input(type="imudp" port="514")
input(type="imtcp" port="514")

# --- Disk-assisted main queue (THE durability mechanism) ---
main_queue(
    queue.type="LinkedList"
    queue.filename="main_queue"
    queue.spoolDirectory="/var/spool/rsyslog"
    queue.maxDiskSpace="1g"
    queue.saveOnShutdown="on"
    queue.size="100000"
)

# --- Per-host file output ---
template(name="PerHostFile" type="string"
    string="/var/log/network/%HOSTNAME%.log")
template(name="StandardLine" type="string"
    string="%TIMESTAMP:::date-rfc3339% %HOSTNAME% %syslogtag%%msg%\n")

*.* action(
    type="omfile"
    dynaFile="PerHostFile"
    template="StandardLine"
    fileCreateMode="0644"
    dirCreateMode="0755"
)
